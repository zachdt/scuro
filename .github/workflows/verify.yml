name: Verify

on:
  push:
    branches:
      - main
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24.11.1

      - uses: oven-sh/setup-bun@v2

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.7

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Install zk dependencies
        run: bun install --cwd zk --frozen-lockfile

      - name: Build blackjack proof artifacts
        run: bun run --cwd zk build:blackjack-initial

      - name: Bun checks
        run: bun run --cwd ops/aws-testnet check

      - name: Bun tests
        run: bun test --cwd ops/aws-testnet

      - name: Targeted Forge build
        run: |
          forge build \
            script/aws/BetaDeployCommon.s.sol \
            script/aws/DeployCore.s.sol \
            script/aws/DeployNumberPickerModule.s.sol \
            script/aws/DeployPokerTournamentModule.s.sol \
            script/aws/DeployPokerPvPModule.s.sol \
            script/aws/DeployBlackjackModule.s.sol \
            script/aws/DeployFinalize.s.sol \
            script/aws/FixtureLoaders.sol \
            script/aws/SmokeNumberPicker.s.sol \
            script/aws/SmokePokerFixture.s.sol \
            script/aws/SmokeBlackjackFixture.s.sol \
            script/aws/SubmitPokerInitialDeal.s.sol \
            script/aws/SubmitPokerDraw.s.sol \
            script/aws/SubmitPokerShowdown.s.sol \
            script/aws/SubmitBlackjackInitialDeal.s.sol \
            script/aws/SubmitBlackjackAction.s.sol \
            script/aws/SubmitBlackjackShowdown.s.sol

      - name: Focused Forge tests
        run: |
          forge clean
          forge test --match-path 'test/aws/*.t.sol' --offline

      - name: Terraform fmt
        run: terraform -chdir=infra/aws/testnet fmt -check -diff

      - name: Terraform validate
        run: |
          terraform -chdir=infra/aws/testnet init -backend=false
          terraform -chdir=infra/aws/testnet validate

      - name: Shellcheck
        run: shellcheck -x script/aws/*.sh ops/aws-testnet/runtime/*.sh

      - name: Build Linux bundle
        run: SCURO_BUNDLE_INCLUDE_HOST_TOOLS=0 bash script/aws/build_bundle.sh /tmp/scuro-beta-bundle.tar.gz
