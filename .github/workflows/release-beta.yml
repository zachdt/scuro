name: Release Beta

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-beta
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.SCURO_BETA_AWS_REGION }}
  TF_IN_AUTOMATION: "true"

jobs:
  prepare:
    runs-on: ubuntu-latest

    steps:
      - name: Require main branch
        run: |
          if [[ "${GITHUB_REF_NAME}" != "main" ]]; then
            echo "Release beta must be dispatched from main." >&2
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.7

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.SCURO_BETA_AWS_ROLE_ARN }}

      - name: Build Linux bundle
        run: |
          mkdir -p /tmp/scuro-release
          bash script/aws/build_bundle.sh "/tmp/scuro-release/${GITHUB_SHA}.tar.gz"

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: beta-bundle
          path: /tmp/scuro-release/${{ github.sha }}.tar.gz

      - name: Write Terraform config
        run: |
          cat > infra/aws/testnet/backend.beta.hcl <<EOF
          bucket         = "${{ vars.SCURO_TF_STATE_BUCKET }}"
          key            = "${{ vars.SCURO_TF_STATE_KEY || 'scuro/testnet/beta/terraform.tfstate' }}"
          region         = "${{ vars.SCURO_TF_STATE_REGION || vars.SCURO_BETA_AWS_REGION }}"
          dynamodb_table = "${{ vars.SCURO_TF_STATE_LOCK_TABLE }}"
          encrypt        = true
          EOF

          cat > infra/aws/testnet/terraform.auto.tfvars.json <<EOF
          {
            "name": "${{ vars.SCURO_BETA_STACK_NAME || 'scuro-testnet-beta' }}",
            "region": "${{ vars.SCURO_BETA_AWS_REGION }}",
            "availability_zone": "${{ vars.SCURO_BETA_AVAILABILITY_ZONE }}",
            "instance_type": "${{ vars.SCURO_BETA_INSTANCE_TYPE || 't3.micro' }}",
            "root_volume_size": ${{ vars.SCURO_BETA_ROOT_VOLUME_SIZE || '20' }},
            "bucket_force_destroy": true,
            "runtime_env_parameter_name": "${{ vars.SCURO_BETA_RUNTIME_ENV_PARAMETER || '' }}",
            "enable_cloudwatch_logs": false,
            "enable_sqs_queue": false
          }
          EOF

      - name: Terraform plan
        run: |
          terraform -chdir=infra/aws/testnet init -backend-config=backend.beta.hcl
          terraform -chdir=infra/aws/testnet state list || true
          terraform -chdir=infra/aws/testnet plan -no-color | tee /tmp/scuro-release/terraform-plan.txt

      - name: Upload Terraform plan
        uses: actions/upload-artifact@v4
        with:
          name: beta-terraform-plan
          path: /tmp/scuro-release/terraform-plan.txt

      - name: Add plan summary
        run: |
          {
            echo "## Beta Terraform Plan"
            echo
            echo '```'
            sed -n '1,200p' /tmp/scuro-release/terraform-plan.txt
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"

  deploy:
    runs-on: ubuntu-latest
    needs: prepare
    environment:
      name: beta

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.7

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.SCURO_BETA_AWS_ROLE_ARN }}

      - name: Download release bundle
        uses: actions/download-artifact@v4
        with:
          name: beta-bundle
          path: /tmp/scuro-release

      - name: Write Terraform config
        run: |
          cat > infra/aws/testnet/backend.beta.hcl <<EOF
          bucket         = "${{ vars.SCURO_TF_STATE_BUCKET }}"
          key            = "${{ vars.SCURO_TF_STATE_KEY || 'scuro/testnet/beta/terraform.tfstate' }}"
          region         = "${{ vars.SCURO_TF_STATE_REGION || vars.SCURO_BETA_AWS_REGION }}"
          dynamodb_table = "${{ vars.SCURO_TF_STATE_LOCK_TABLE }}"
          encrypt        = true
          EOF

          cat > infra/aws/testnet/terraform.auto.tfvars.json <<EOF
          {
            "name": "${{ vars.SCURO_BETA_STACK_NAME || 'scuro-testnet-beta' }}",
            "region": "${{ vars.SCURO_BETA_AWS_REGION }}",
            "availability_zone": "${{ vars.SCURO_BETA_AVAILABILITY_ZONE }}",
            "instance_type": "${{ vars.SCURO_BETA_INSTANCE_TYPE || 't3.micro' }}",
            "root_volume_size": ${{ vars.SCURO_BETA_ROOT_VOLUME_SIZE || '20' }},
            "bucket_force_destroy": true,
            "runtime_env_parameter_name": "${{ vars.SCURO_BETA_RUNTIME_ENV_PARAMETER || '' }}",
            "enable_cloudwatch_logs": false,
            "enable_sqs_queue": false
          }
          EOF

      - name: Terraform apply
        run: |
          terraform -chdir=infra/aws/testnet init -backend-config=backend.beta.hcl
          terraform -chdir=infra/aws/testnet apply -auto-approve

      - name: Capture Terraform outputs
        run: |
          INSTANCE_ID="$(terraform -chdir=infra/aws/testnet output -raw instance_id)"
          ARTIFACTS_BUCKET="$(terraform -chdir=infra/aws/testnet output -raw artifacts_bucket)"
          {
            echo "INSTANCE_ID=${INSTANCE_ID}"
            echo "ARTIFACTS_BUCKET=${ARTIFACTS_BUCKET}"
            echo "BUNDLE_URI=s3://${ARTIFACTS_BUCKET}/bundles/${GITHUB_SHA}.tar.gz"
          } >> "${GITHUB_ENV}"

      - name: Upload bundle to artifacts bucket
        run: |
          aws s3 cp \
            "/tmp/scuro-release/${GITHUB_SHA}.tar.gz" \
            "s3://${ARTIFACTS_BUCKET}/bundles/${GITHUB_SHA}.tar.gz"

      - name: Bootstrap host
        run: bash script/aws/remote_bootstrap.sh "${INSTANCE_ID}" "${BUNDLE_URI}" "${AWS_REGION}"

      - name: Wait for operator health
        run: bash script/aws/remote_wait_for_health.sh "${INSTANCE_ID}" "${AWS_REGION}"

      - name: Deploy protocol
        run: |
          bash script/aws/remote_operator.sh "${INSTANCE_ID}" POST /deploy "" "${AWS_REGION}" \
            | tee /tmp/scuro-release/deploy-manifest.json

      - name: Check manifest and actors
        run: |
          bash script/aws/remote_operator.sh "${INSTANCE_ID}" GET /manifest "" "${AWS_REGION}" \
            | tee /tmp/scuro-release/manifest.json
          bash script/aws/remote_operator.sh "${INSTANCE_ID}" GET /actors "" "${AWS_REGION}" \
            | tee /tmp/scuro-release/actors.json

      - name: Run remote smoke jobs
        run: |
          bash script/aws/remote_smoke.sh "${INSTANCE_ID}" number-picker "${AWS_REGION}" \
            | tee /tmp/scuro-release/smoke-number-picker.json
          bash script/aws/remote_smoke.sh "${INSTANCE_ID}" poker "${AWS_REGION}" \
            | tee /tmp/scuro-release/smoke-poker.json
          bash script/aws/remote_smoke.sh "${INSTANCE_ID}" blackjack "${AWS_REGION}" \
            | tee /tmp/scuro-release/smoke-blackjack.json

      - name: Export release snapshot
        run: |
          SNAPSHOT_NAME="beta-${GITHUB_SHA:0:12}"
          bash script/aws/remote_snapshot_export.sh "${INSTANCE_ID}" "${SNAPSHOT_NAME}" "${AWS_REGION}" \
            | tee /tmp/scuro-release/snapshot.json

      - name: Upload release records
        uses: actions/upload-artifact@v4
        with:
          name: beta-release-records
          path: /tmp/scuro-release

      - name: Add release summary
        run: |
          {
            echo "## Beta Release"
            echo
            echo "- Git SHA: \`${GITHUB_SHA}\`"
            echo "- Instance ID: \`${INSTANCE_ID}\`"
            echo "- Bundle URI: \`${BUNDLE_URI}\`"
            echo
            echo "Artifacts:"
            echo "- deploy-manifest.json"
            echo "- manifest.json"
            echo "- actors.json"
            echo "- smoke-number-picker.json"
            echo "- smoke-poker.json"
            echo "- smoke-blackjack.json"
            echo "- snapshot.json"
          } >> "${GITHUB_STEP_SUMMARY}"
