name: Release Beta

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-beta
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.SCURO_BETA_AWS_REGION }}
  FOUNDRY_GIT_REF: ${{ vars.SCURO_BETA_FOUNDRY_GIT_REF || 'v1.5.1' }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  TF_IN_AUTOMATION: "true"

jobs:
  prepare:
    runs-on: ubuntu-latest

    steps:
      - name: Require main branch
        run: |
          if [[ "${GITHUB_REF_NAME}" != "main" ]]; then
            echo "Release beta must be dispatched from main." >&2
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24.11.1

      - uses: oven-sh/setup-bun@v2

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.7

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.SCURO_BETA_AWS_ROLE_ARN }}

      - name: Build Amazon Linux Foundry tools
        run: |
          mkdir -p /tmp/scuro-release/foundry-tools
          bash script/aws/build_foundry_al2023_tools.sh /tmp/scuro-release/foundry-tools

      - name: Check Bun toolchain
        run: |
          command -v bun
          bun --version

      - name: Build Linux bundle
        env:
          SCURO_BUNDLE_FORGE_BIN: /tmp/scuro-release/foundry-tools/forge
          SCURO_BUNDLE_CAST_BIN: /tmp/scuro-release/foundry-tools/cast
          SCURO_BUNDLE_ANVIL_BIN: /tmp/scuro-release/foundry-tools/anvil
          SCURO_BUNDLE_SVM_DIR: /tmp/scuro-release/foundry-tools/svm
        run: |
          mkdir -p /tmp/scuro-release
          bash script/aws/build_bundle.sh "/tmp/scuro-release/${GITHUB_SHA}.tar.gz"

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: beta-bundle
          path: /tmp/scuro-release/${{ github.sha }}.tar.gz

      - name: Write Terraform config
        run: |
          cat > infra/aws/testnet/backend.beta.hcl <<EOF
          bucket         = "${{ vars.SCURO_TF_STATE_BUCKET }}"
          key            = "${{ vars.SCURO_TF_STATE_KEY || 'scuro/testnet/beta/terraform.tfstate' }}"
          region         = "${{ vars.SCURO_TF_STATE_REGION || vars.SCURO_BETA_AWS_REGION }}"
          dynamodb_table = "${{ vars.SCURO_TF_STATE_LOCK_TABLE }}"
          encrypt        = true
          EOF

          cat > infra/aws/testnet/terraform.auto.tfvars.json <<EOF
          {
            "name": "${{ vars.SCURO_BETA_STACK_NAME || 'scuro-testnet-beta' }}",
            "region": "${{ vars.SCURO_BETA_AWS_REGION }}",
            "availability_zone": "${{ vars.SCURO_BETA_AVAILABILITY_ZONE }}",
            "instance_type": "${{ vars.SCURO_BETA_INSTANCE_TYPE || 't3.micro' }}",
            "root_volume_size": ${{ vars.SCURO_BETA_ROOT_VOLUME_SIZE || '40' }},
            "bucket_force_destroy": true,
            "runtime_env_parameter_name": "${{ vars.SCURO_BETA_RUNTIME_ENV_PARAMETER || '' }}",
            "enable_cloudwatch_logs": false,
            "enable_sqs_queue": false,
            "enable_public_rpc": true
          }
          EOF

      - name: Terraform plan
        run: |
          terraform -chdir=infra/aws/testnet init -backend-config=backend.beta.hcl
          terraform -chdir=infra/aws/testnet state list || true
          terraform -chdir=infra/aws/testnet plan -no-color | tee /tmp/scuro-release/terraform-plan.txt

      - name: Upload Terraform plan
        uses: actions/upload-artifact@v4
        with:
          name: beta-terraform-plan
          path: /tmp/scuro-release/terraform-plan.txt

      - name: Add plan summary
        run: |
          {
            echo "## Beta Terraform Plan"
            echo
            echo '```'
            sed -n '1,200p' /tmp/scuro-release/terraform-plan.txt
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"

  deploy:
    runs-on: ubuntu-latest
    needs: prepare
    environment:
      name: beta

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24.11.1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.7

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.SCURO_BETA_AWS_ROLE_ARN }}

      - name: Download release bundle
        uses: actions/download-artifact@v4
        with:
          name: beta-bundle
          path: /tmp/scuro-release

      - name: Write Terraform config
        run: |
          cat > infra/aws/testnet/backend.beta.hcl <<EOF
          bucket         = "${{ vars.SCURO_TF_STATE_BUCKET }}"
          key            = "${{ vars.SCURO_TF_STATE_KEY || 'scuro/testnet/beta/terraform.tfstate' }}"
          region         = "${{ vars.SCURO_TF_STATE_REGION || vars.SCURO_BETA_AWS_REGION }}"
          dynamodb_table = "${{ vars.SCURO_TF_STATE_LOCK_TABLE }}"
          encrypt        = true
          EOF

          cat > infra/aws/testnet/terraform.auto.tfvars.json <<EOF
          {
            "name": "${{ vars.SCURO_BETA_STACK_NAME || 'scuro-testnet-beta' }}",
            "region": "${{ vars.SCURO_BETA_AWS_REGION }}",
            "availability_zone": "${{ vars.SCURO_BETA_AVAILABILITY_ZONE }}",
            "instance_type": "${{ vars.SCURO_BETA_INSTANCE_TYPE || 't3.micro' }}",
            "root_volume_size": ${{ vars.SCURO_BETA_ROOT_VOLUME_SIZE || '40' }},
            "bucket_force_destroy": true,
            "runtime_env_parameter_name": "${{ vars.SCURO_BETA_RUNTIME_ENV_PARAMETER || '' }}",
            "enable_cloudwatch_logs": false,
            "enable_sqs_queue": false,
            "enable_public_rpc": true
          }
          EOF

      - name: Terraform apply
        run: |
          terraform -chdir=infra/aws/testnet init -backend-config=backend.beta.hcl
          terraform -chdir=infra/aws/testnet apply -auto-approve

      - name: Capture Terraform outputs
        run: |
          INSTANCE_ID="$(terraform -chdir=infra/aws/testnet output -raw instance_id)"
          ARTIFACTS_BUCKET="$(terraform -chdir=infra/aws/testnet output -raw artifacts_bucket)"
          PUBLIC_IP="$(terraform -chdir=infra/aws/testnet output -raw public_ip)"
          CLOUDFRONT_DOMAIN="$(terraform -chdir=infra/aws/testnet output -raw cloudfront_domain)"
          PUBLIC_RPC_URL="$(terraform -chdir=infra/aws/testnet output -raw public_rpc_url)"
          RELEASE_RECORDS_PREFIX="$(terraform -chdir=infra/aws/testnet output -raw release_records_prefix)"
          {
            echo "INSTANCE_ID=${INSTANCE_ID}"
            echo "ARTIFACTS_BUCKET=${ARTIFACTS_BUCKET}"
            echo "PUBLIC_IP=${PUBLIC_IP}"
            echo "CLOUDFRONT_DOMAIN=${CLOUDFRONT_DOMAIN}"
            echo "PUBLIC_RPC_URL=${PUBLIC_RPC_URL}"
            echo "RELEASE_RECORDS_PREFIX=${RELEASE_RECORDS_PREFIX}"
            echo "BUNDLE_URI=s3://${ARTIFACTS_BUCKET}/bundles/${GITHUB_SHA}.tar.gz"
          } >> "${GITHUB_ENV}"

      - name: Upload bundle to artifacts bucket
        run: |
          aws s3 cp \
            "/tmp/scuro-release/${GITHUB_SHA}.tar.gz" \
            "s3://${ARTIFACTS_BUCKET}/bundles/${GITHUB_SHA}.tar.gz"

      - name: Wait for EC2 and SSM readiness
        run: |
          aws ec2 wait instance-running \
            --instance-ids "${INSTANCE_ID}" \
            --region "${AWS_REGION}"

          aws ec2 wait instance-status-ok \
            --instance-ids "${INSTANCE_ID}" \
            --region "${AWS_REGION}"

          for attempt in $(seq 1 30); do
            PING_STATUS="$(aws ssm describe-instance-information \
              --region "${AWS_REGION}" \
              --filters "Key=InstanceIds,Values=${INSTANCE_ID}" \
              --query 'InstanceInformationList[0].PingStatus' \
              --output text 2>/dev/null || true)"

            if [[ "${PING_STATUS}" == "Online" ]]; then
              echo "SSM is online for ${INSTANCE_ID}"
              exit 0
            fi

            echo "waiting for SSM registration (${attempt}/30)"
            sleep 10
          done

          echo "instance did not become SSM-online in time" >&2
          exit 1

      - name: Bootstrap host
        run: bash script/aws/remote_bootstrap.sh "${INSTANCE_ID}" "${BUNDLE_URI}" "${AWS_REGION}"

      - name: Wait for operator health
        run: bash script/aws/remote_wait_for_health.sh "${INSTANCE_ID}" "${AWS_REGION}"

      - name: Wait for chain readiness
        run: bash script/aws/remote_wait_for_chain.sh "${INSTANCE_ID}" "${AWS_REGION}"

      - name: Deploy protocol
        run: |
          bash script/aws/remote_operator.sh "${INSTANCE_ID}" POST /deploy "" "${AWS_REGION}" \
            | tee /tmp/scuro-release/deploy-manifest.json

      - name: Check manifest and actors
        run: |
          bash script/aws/remote_operator.sh "${INSTANCE_ID}" GET /manifest "" "${AWS_REGION}" \
            | tee /tmp/scuro-release/manifest.json
          bash script/aws/remote_operator.sh "${INSTANCE_ID}" GET /actors "" "${AWS_REGION}" \
            | tee /tmp/scuro-release/actors.json

      - name: Run remote smoke jobs
        run: |
          bash script/aws/remote_smoke.sh "${INSTANCE_ID}" number-picker "${AWS_REGION}" \
            | tee /tmp/scuro-release/smoke-number-picker.json
          bash script/aws/remote_smoke.sh "${INSTANCE_ID}" poker "${AWS_REGION}" \
            | tee /tmp/scuro-release/smoke-poker.json
          bash script/aws/remote_smoke.sh "${INSTANCE_ID}" blackjack "${AWS_REGION}" \
            | tee /tmp/scuro-release/smoke-blackjack.json

      - name: Export release snapshot
        run: |
          SNAPSHOT_NAME="beta-${GITHUB_SHA:0:12}"
          bash script/aws/remote_snapshot_export.sh "${INSTANCE_ID}" "${SNAPSHOT_NAME}" "${AWS_REGION}" \
            | tee /tmp/scuro-release/snapshot.json

      - name: Verify public RPC
        run: |
          ready=0
          for attempt in $(seq 1 40); do
            response="$(curl -sS \
              -H 'content-type: application/json' \
              --data '{"jsonrpc":"2.0","method":"eth_chainId","params":[],"id":1}' \
              -w '\n%{http_code}' \
              "${PUBLIC_RPC_URL}")"

            body="$(printf '%s\n' "${response}" | sed '$d')"
            status="$(printf '%s\n' "${response}" | tail -n1)"

            printf '%s\n' "${body}" > /tmp/scuro-release/public-rpc-health.json

            if [[ "${status}" == "200" ]] && python3 -c 'import json, sys; print(json.loads(sys.argv[1])["result"])' "${body}" > /tmp/scuro-release/public-rpc-chain-id.txt
            then
              ready=1
              break
            fi

            echo "waiting for CloudFront public RPC (${attempt}/40) status=${status}" >&2
            printf '%s\n' "${body}" | head -c 400 >&2 || true
            echo >&2
            sleep 15
          done

          if [[ "${ready}" != "1" ]]; then
            echo "CloudFront public RPC did not become ready in time" >&2
            exit 1
          fi

          curl -fsS \
            -H 'content-type: application/json' \
            --data '{"jsonrpc":"2.0","method":"eth_blockNumber","params":[],"id":1}' \
            "${PUBLIC_RPC_URL}" \
            | tee /tmp/scuro-release/public-rpc-block-number.json >/dev/null

      - name: Verify public origin boundaries
        run: |
          test "$(curl -s -o /dev/null -w '%{http_code}' "http://${PUBLIC_IP}/")" = "403"
          ! curl -fsS --connect-timeout 3 "http://${PUBLIC_IP}:8545"
          ! curl -fsS --connect-timeout 3 "http://${PUBLIC_IP}:8787"

      - name: Publish release records to S3
        env:
          SCURO_BETA_STACK_NAME: ${{ vars.SCURO_BETA_STACK_NAME || 'scuro-testnet-beta' }}
        run: |
          python3 - <<'PY' > /tmp/scuro-release/release-record.json
          import json
          import os

          record = {
              "gitSha": os.environ["GITHUB_SHA"],
              "workflowRunUrl": f"{os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}",
              "awsRegion": os.environ["AWS_REGION"],
              "stackName": os.environ.get("SCURO_BETA_STACK_NAME", ""),
              "instanceId": os.environ["INSTANCE_ID"],
              "bundleUri": os.environ["BUNDLE_URI"],
              "cloudFrontDomain": os.environ["CLOUDFRONT_DOMAIN"],
              "publicRpcUrl": os.environ["PUBLIC_RPC_URL"],
              "manifestKey": f"releases/{os.environ['GITHUB_SHA']}/manifest.json",
              "actorsKey": f"releases/{os.environ['GITHUB_SHA']}/actors.json",
              "deployManifestKey": f"releases/{os.environ['GITHUB_SHA']}/deploy-manifest.json",
              "snapshotKey": f"releases/{os.environ['GITHUB_SHA']}/snapshot.json",
          }

          snapshot_path = "/tmp/scuro-release/snapshot.json"
          if os.path.exists(snapshot_path):
              with open(snapshot_path, "r", encoding="utf-8") as handle:
                  snapshot = json.load(handle)
              record["snapshotName"] = snapshot.get("snapshotName", "")
              record["snapshotPath"] = snapshot.get("s3Path") or snapshot.get("localPath", "")

          print(json.dumps(record, indent=2))
          PY

          for file in deploy-manifest.json manifest.json actors.json snapshot.json release-record.json; do
            aws s3 cp \
              "/tmp/scuro-release/${file}" \
              "s3://${ARTIFACTS_BUCKET}/releases/${GITHUB_SHA}/${file}"
          done

          aws s3 cp \
            "/tmp/scuro-release/release-record.json" \
            "s3://${ARTIFACTS_BUCKET}/releases/latest.json"

      - name: Collect host diagnostics on failure
        if: failure() && env.INSTANCE_ID != ''
        run: |
          mkdir -p /tmp/scuro-release
          bash script/aws/remote_collect_diagnostics.sh "${INSTANCE_ID}" "${AWS_REGION}" \
            | tee /tmp/scuro-release/host-diagnostics.txt

      - name: Upload release records
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: beta-release-records
          path: /tmp/scuro-release

      - name: Add release summary
        if: always()
        run: |
          {
            echo "## Beta Release"
            echo
            echo "- Git SHA: \`${GITHUB_SHA}\`"
            echo "- Instance ID: \`${INSTANCE_ID}\`"
            echo "- Bundle URI: \`${BUNDLE_URI}\`"
            echo "- Public RPC URL: \`${PUBLIC_RPC_URL}\`"
            echo "- Release Records Prefix: \`${RELEASE_RECORDS_PREFIX}\`"
            echo
            echo "Artifacts:"
            echo "- deploy-manifest.json"
            echo "- manifest.json"
            echo "- actors.json"
            echo "- smoke-number-picker.json"
            echo "- smoke-poker.json"
            echo "- smoke-blackjack.json"
            echo "- snapshot.json"
            echo "- release-record.json"
          } >> "${GITHUB_STEP_SUMMARY}"
